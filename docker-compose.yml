version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research_assistant_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d research_assistant" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: research_assistant_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
      - ./data:/data
    environment:
      - EVAL_OPENAI_API_KEY=${EVAL_OPENAI_API_KEY}
      - EVAL_OPENAI_API_BASE=https://integrate.api.nvidia.com/v1
      - EVAL_OPENAI_MODEL_NAME=mistralai/mistral-medium-3.5-128b
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - LLM_OPENAI_API_BASE=https://integrate.api.nvidia.com/v1
      - LLM_OPENAI_MODEL_NAME=mistralai/mistral-medium-3.5-128b
      - EMBEDDING_OPENAI_API_KEY=${EMBEDDING_OPENAI_API_KEY}
      - EMBEDDING_OPENAI_API_BASE=https://integrate.api.nvidia.com/v1
      - EMBEDDING_OPENAI_MODEL_NAME=nvidia/nv-embed-v1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: research_assistant_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_API_KEY=test-api-key-123
    depends_on:
      - backend

volumes:
  postgres_data:
