<!DOCTYPE html>
<html>
<head>
  <title>ArXiv Downloader Helper</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
    h1 { color: #818cf8; }
    .paper { background: #1e293b; border-radius: 8px; padding: 12px 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
    .paper .id { font-family: monospace; font-weight: bold; }
    .status { padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: bold; }
    .status.waiting { background: #334155; color: #94a3b8; }
    .status.downloading { background: #1e3a5f; color: #60a5fa; }
    .status.processing { background: #422006; color: #fbbf24; animation: pulse 1.5s infinite; }
    .status.ready { background: #064e3b; color: #34d399; }
    .status.error { background: #450a0a; color: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    button { background: #6366f1; border: none; color: white; padding: 10px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #4f46e5; }
    #log { margin-top: 16px; font-family: monospace; font-size: 0.85em; color: #94a3b8; max-height: 200px; overflow-y: auto; }
  </style>
  <script>
    const API = 'http://localhost:8000';
    const HEADERS = { 'X-API-Key': 'test-api-key-123' };
    const PAPERS = ['1706.03762', '1512.03385', '1810.04805'];

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br/>`;
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(idx, cls, text) {
      const el = document.getElementById(`status-${idx}`);
      el.className = `status ${cls}`;
      el.textContent = text;
    }

    async function pollUntilDone(docId, idx) {
      // Poll document status every 5s until ready or error
      while (true) {
        await new Promise(r => setTimeout(r, 5000));
        try {
          const res = await fetch(`${API}/api/documents/${docId}`, { headers: HEADERS });
          if (!res.ok) continue;
          const doc = await res.json();
          const status = doc.status || 'processing';
          if (status === 'ready') {
            setStatus(idx, 'ready', `\u2705 Ready (${doc.title || docId})`);
            log(`Paper ${PAPERS[idx]}: READY - ${doc.title || 'Unknown'}`);
            return 'ready';
          } else if (status === 'error') {
            setStatus(idx, 'error', `\u274c Error: ${doc.error_message || 'unknown'}`);
            log(`Paper ${PAPERS[idx]}: ERROR - ${doc.error_message || 'unknown'}`);
            return 'error';
          }
          // Still processing
          log(`Paper ${PAPERS[idx]}: still processing...`);
        } catch (e) {
          log(`Poll error for ${PAPERS[idx]}: ${e.message}`);
        }
      }
    }

    async function start() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      for (let i = 0; i < PAPERS.length; i++) {
        const arxivId = PAPERS[i];

        // Download
        setStatus(i, 'downloading', '\u2b07\ufe0f Downloading...');
        log(`Starting download of ${arxivId}...`);
        try {
          const res = await fetch(`${API}/api/documents/download_arxiv?arxiv_id=${arxivId}`, {
            method: 'POST', headers: HEADERS
          });
          const data = await res.json();
          if (res.status === 202 || res.status === 200) {
            const docId = data.document_id || data.id;
            setStatus(i, 'processing', '\u23f3 Processing...');
            log(`${arxivId} accepted (doc: ${docId}). Waiting for ingestion to complete...`);

            // WAIT for this paper to finish before starting next
            await pollUntilDone(docId, i);
            
            // Small cooldown before next paper to let rate limits recover
            if (i < PAPERS.length - 1) {
              log(`Cooldown: waiting 15s before next paper to reset rate limits...`);
              await new Promise(r => setTimeout(r, 15000));
            }
          } else {
            setStatus(i, 'error', `\u274c HTTP ${res.status}`);
            log(`${arxivId} failed: HTTP ${res.status} - ${JSON.stringify(data)}`);
          }
        } catch (e) {
          setStatus(i, 'error', `\u274c ${e.message}`);
          log(`${arxivId} error: ${e.message}`);
        }
      }

      btn.disabled = false;
      log('All papers processed!');
    }
  </script>
</head>
<body>
  <h1>\ud83d\udcc4 ArXiv Paper Downloader</h1>
  <p>Downloads and ingests papers <strong>one at a time</strong> to avoid rate limit issues.</p>
  
  <div id="papers">
    <div class="paper"><span class="id">1706.03762</span> <span id="status-0" class="status waiting">Waiting</span></div>
    <div class="paper"><span class="id">1512.03385</span> <span id="status-1" class="status waiting">Waiting</span></div>
    <div class="paper"><span class="id">1810.04805</span> <span id="status-2" class="status waiting">Waiting</span></div>
  </div>
  
  <br/>
  <button id="downloadBtn" onclick="start()">Start Download</button>
  <div id="log">Ready. Click "Start Download" to begin sequential ingestion.</div>
</body>
</html>
