<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bulk Paper Download Helper</title>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
    h1 { color: #6366f1; border-bottom: 1px solid #334155; padding-bottom: 12px; }
    .paper-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 16px 20px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #334155; }
    .status { padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: bold; }
    .status.waiting { background: #334155; color: #94a3b8; }
    .status.downloading { background: #1e3a5f; color: #60a5fa; }
    .status.processing { background: #422006; color: #fbbf24; animation: pulse 1.5s infinite; }
    .status.ready { background: #064e3b; color: #34d399; }
    .status.error { background: #450a0a; color: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    button { background: #6366f1; border: none; color: white; padding: 10px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #4f46e5; }
    #log { margin-top: 16px; font-family: monospace; font-size: 0.85em; color: #94a3b8; max-height: 200px; overflow-y: auto; }
  </style>
  <script>
    const API = `${window.location.protocol}//${window.location.hostname}:8000`;
    const HEADERS = { 'X-API-Key': 'test-api-key-123' };
    const PAPERS = ['1706.03762', '1512.03385', '1810.04805'];

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br/>`;
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(idx, cls, text) {
      const el = document.getElementById(`status-${idx}`);
      el.className = `status ${cls}`;
      el.textContent = text;
    }

    async function pollUntilDone(docId, idx) {
      // Poll document status every 5s until ready or error
      while (true) {
        await new Promise(r => setTimeout(r, 5000));
        try {
          const res = await fetch(`${API}/api/documents`, { headers: HEADERS });
          if (!res.ok) throw new Error('API failure');
          const docs = await res.json();
          const match = docs.find(d => d.id === docId);
          if (!match) continue;

          log(`Paper ${PAPERS[idx]} status: ${match.status}`);
          setStatus(idx, match.status, match.status.toUpperCase());

          if (match.status === 'ready') {
            log(`Paper ${PAPERS[idx]} ingestion completed successfully!`);
            break;
          }
          if (match.status === 'error') {
            log(`Paper ${PAPERS[idx]} ingestion failed: ${match.error_message}`);
            break;
          }
        } catch (e) {
          log(`Polling error: ${e.message}`);
        }
      }
    }

    async function downloadPaper(arxivId, idx) {
      log(`Initiating download for arXiv:${arxivId}...`);
      setStatus(idx, 'downloading', 'DOWNLOADING');

      try {
        const res = await fetch(`${API}/api/documents/download-arxiv?arxiv_id=${arxivId}`, {
          method: 'POST',
          headers: HEADERS
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Download trigger failed');
        }
        const data = await res.json();
        log(`ArXiv:${arxivId} download started. Document ID: ${data.document_id}`);
        setStatus(idx, 'processing', 'PROCESSING');
        await pollUntilDone(data.document_id, idx);
      } catch (e) {
        log(`Download failed for ${arxivId}: ${e.message}`);
        setStatus(idx, 'error', 'ERROR');
      }
    }

    async function runDownloadAll() {
      document.getElementById('start-btn').disabled = true;
      log('Starting bulk download of baseline papers...');
      for (let i = 0; i < PAPERS.length; i++) {
        await downloadPaper(PAPERS[i], i);
        // Spacing requests slightly
        await new Promise(r => setTimeout(r, 2000));
      }
      log('Bulk download execution complete.');
      document.getElementById('start-btn').disabled = false;
    }
  </script>
</head>
<body>
  <h1>Bulk Paper Download Helper</h1>
  <p>Trigger automated downloads and ingestions of the baseline research papers:</p>
  
  <div class="paper-row">
    <div><strong>Attention Is All You Need (Transformer)</strong><br/><small>arXiv:1706.03762</small></div>
    <div id="status-0" class="status waiting">WAITING</div>
  </div>
  
  <div class="paper-row">
    <div><strong>Deep Residual Learning (ResNet)</strong><br/><small>arXiv:1512.03385</small></div>
    <div id="status-1" class="status waiting">WAITING</div>
  </div>
  
  <div class="paper-row">
    <div><strong>BERT Pre-training</strong><br/><small>arXiv:1810.04805</small></div>
    <div id="status-2" class="status waiting">WAITING</div>
  </div>

  <div style="margin-top: 24px; display: flex; justify-content: space-between; align-items: center;">
    <button id="start-btn" onclick="runDownloadAll()">Start Bulk Ingestion</button>
    <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.9em;">&larr; Back to App</a>
  </div>

  <div id="log"></div>
</body>
</html>
